<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Research Capture</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Research Capture</h1>
      <p id="status">Сначала скопируйте текст в YouTube Summary или откройте расшифровку YouTube.</p>
      <button id="clipboard" type="button">Забрать текст из буфера</button>
      <button id="visible" type="button" class="secondary">Забрать видимую расшифровку</button>
      <p class="note">Отправляются только текст, который вы получили или открыли, описание и URL на ваш компьютер.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
