version: 1
servers:
  - name: example-filesystem
    description: "Пример локального MCP-сервера. Отключён по умолчанию."
    enabled: false
    profiles: ["development"]
    transport: stdio
    location: local
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "%USERPROFILE%"]
    url: null
    supported_clients: ["codex", "claude-code"]
    supported_os: ["windows"]
    required_programs: ["node", "npx"]
    install: "Установить Node.js LTS из официального источника; пакет запускается через npx при явном включении."
    env: []
    secret_names: []
    official_source: "https://modelcontextprotocol.io/"
    version_policy: "unpinned-example-disabled"
    verify_command: null
    health_check: null
    trust_level: low
    permissions:
      filesystem: ["%USERPROFILE%"]
      network: false
      can_modify_external_data: false
    security_notes: "Пример отключён. Перед включением нужно закрепить пакет/версию и проверить официальный пакет."
  - name: youtube-research
    description: "Локальный read-only MCP для поиска и метаданных публичных роликов через YouTube Data API v3."
    enabled: false
    profiles: ["research"]
    transport: stdio
    location: local
    command: "node"
    args: ["tools/youtube-research-mcp/index.mjs"]
    url: null
    supported_clients: ["codex"]
    supported_os: ["windows", "macos", "linux"]
    required_programs: ["node", "npm"]
    install: "В tools/youtube-research-mcp выполнить npm install; создать и ограничить ключ YouTube Data API v3."
    env: ["YOUTUBE_API_KEY"]
    secret_names: ["YOUTUBE_API_KEY"]
    official_source: "https://developers.google.com/youtube/v3/getting-started"
    version_policy: "@modelcontextprotocol/sdk pinned to 1.29.0"
    verify_command: "node tools/youtube-research-mcp/index.mjs"
    health_check: "Call youtube_search with a bounded query after setting YOUTUBE_API_KEY."
    trust_level: medium
    permissions:
      filesystem: []
      network: true
      can_modify_external_data: false
    security_notes: "Read-only public metadata. API key is forwarded from the local environment and must never be committed. Captions and private data are intentionally unsupported."
  - name: glasp-library
    description: "Remote read-only MCP for the user-authorized Glasp library of highlights and memories."
    enabled: false
    profiles: ["research"]
    transport: streamable-http
    location: remote
    command: null
    args: null
    url: "https://glasp.co/api/mcp"
    supported_clients: ["codex", "chatgpt", "claude-code"]
    supported_os: ["windows", "macos", "linux"]
    required_programs: []
    install: "Connect through the MCP client's OAuth flow after reviewing Glasp permissions. No token is stored in this repository."
    env: []
    secret_names: []
    official_source: "https://glasp.co/mcp"
    version_policy: "Hosted remote service; verify the official OAuth consent screen before enabling."
    verify_command: null
    health_check: "List or query the user-authorized Glasp library after OAuth approval."
    trust_level: medium
    permissions:
      filesystem: []
      network: true
      can_modify_external_data: false
    security_notes: "Read-only library access via OAuth. It is not a documented bulk transcript API and must not be used to bypass platform access controls."
